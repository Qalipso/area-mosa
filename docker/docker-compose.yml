version: "3.8"

services:
  # --- Evolution API (WhatsApp) ---
  evolution-api:
    container_name: evo_api
    image: evoapicloud/evolution-api:v2.3.7
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - postgres
      - redis
    networks:
      - area-mosa-net

  # --- n8n (Workflow Automation) ---
  n8n:
    container_name: n8n
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=area-mosa-2025
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=postgres
      - DB_POSTGRESDB_PASSWORD=postgres123
      - N8N_ENCRYPTION_KEY=area-mosa-encryption-key-change-me
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=true
      - N8N_RESTRICT_ENVIRONMENT_VARIABLES_ACCESS=false
      - NODE_FUNCTION_ALLOW_BUILTIN=crypto,fs,path,https,url,querystring
      # --- AREA MOSA env vars (used by workflows) ---
      - EVOLUTION_API_URL=http://evo_api:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-area-mosa-evo-key}
      - GOOGLE_CALENDAR_ID=${GOOGLE_CALENDAR_ID:-primary}
      - GOOGLE_CALENDAR_ACCESS_TOKEN=${GOOGLE_CALENDAR_ACCESS_TOKEN:-}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./service-account.json:/home/node/service-account.json:ro
    depends_on:
      - postgres
    networks:
      - area-mosa-net

  # --- PostgreSQL (shared by Evolution API + n8n) ---
  postgres:
    container_name: postgres
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres123
      - POSTGRES_DB=evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - area-mosa-net

  # --- Redis (cache for Evolution API) ---
  redis:
    container_name: redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - area-mosa-net

volumes:
  evolution_instances:
  n8n_data:
  postgres_data:
  redis_data:

networks:
  area-mosa-net:
    driver: bridge
